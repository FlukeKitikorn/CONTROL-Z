# docker-compose.yaml — CONTROL-Z All-in-One Development Convenience File
#
# This single-file setup is for local development only (uses build: context).
#
# RECOMMENDED split-file approach (dev/prod separation):
#   Development : docker compose -f compose.yaml -f compose.dev.yaml up
#   Production  : docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Before first run — create storage directories:
#   mkdir -p storage/{uploads/{users,products,documents,temp},backup,logs/nginx,letsencrypt,certbot-webroot}

name: controlz

# ── Shared defaults applied to every service via <<: *service-defaults ────────
x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

# ── Backend env — single source of truth for backend + worker ─────────────────
x-backend-env: &backend-env
  DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
  PASSWORD_RESET_SECRET_KEY: "${PASSWORD_RESET_SECRET_KEY}"
  DEBUG: "${DEBUG:-false}"
  CORS_ORIGINS: "${CORS_ORIGINS}"
  FRONTEND_BASE_URL: "${FRONTEND_BASE_URL}"
  MAIL_ENABLED: "${MAIL_ENABLED:-false}"
  MAIL_SERVER: "${MAIL_SERVER:-smtp.gmail.com}"
  MAIL_PORT: "${MAIL_PORT:-587}"
  MAIL_STARTTLS: "${MAIL_STARTTLS:-true}"
  MAIL_SSL_TLS: "${MAIL_SSL_TLS:-false}"
  MAIL_USERNAME: "${MAIL_USERNAME:-}"
  MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
  MAIL_FROM: "${MAIL_FROM:-}"
  MAIL_FROM_NAME: "${MAIL_FROM_NAME:-CONTROL-Z}"
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
  REDIS_CACHE_ENABLED: "${REDIS_CACHE_ENABLED:-true}"
  REDIS_SESSIONS_ENABLED: "${REDIS_SESSIONS_ENABLED:-true}"
  REDIS_CACHE_EF_TTL_SECONDS: "${REDIS_CACHE_EF_TTL_SECONDS:-3600}"
  REDIS_CACHE_CALC_LATEST_TTL_SECONDS: "${REDIS_CACHE_CALC_LATEST_TTL_SECONDS:-120}"
  REDIS_CACHE_ANNOUNCEMENTS_TTL_SECONDS: "${REDIS_CACHE_ANNOUNCEMENTS_TTL_SECONDS:-60}"
  REDIS_CACHE_BUNDLE_TTL_SECONDS: "${REDIS_CACHE_BUNDLE_TTL_SECONDS:-120}"
  SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
  UPLOAD_ROOT: "/app/storage/uploads"

services:

  # ── Nginx — Reverse Proxy + SSL + Rate Limiting + Static Files ──────────────
  nginx:
    <<: *service-defaults
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./storage/uploads:/var/www/uploads:ro
      - ./storage/letsencrypt:/etc/letsencrypt:ro
      - ./storage/certbot-webroot:/var/www/certbot:ro
      - ./storage/logs/nginx:/var/log/nginx
    networks:
      - proxy-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend — React SPA ────────────────────────────────────────────────────
  frontend:
    <<: *service-defaults
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    networks:
      - proxy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Backend — FastAPI + Uvicorn ────────────────────────────────────────────
  backend:
    <<: *service-defaults
    build:
      context: ./Backend
      dockerfile: Dockerfile
    user: "1001:1001"
    environment:
      <<: *backend-env
    volumes:
      - ./storage/uploads:/app/storage/uploads
    networks:
      - proxy-network
      - backend-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MySQL 8.0 ───────────────────────────────────────────────────────────────
  mysql:
    <<: *service-defaults
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-control_z}"
      MYSQL_USER: "${MYSQL_USER:-user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql    # named volume: persists across rebuilds
    networks:
      - backend-network
    # No public port — internal network only
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data             # named volume: persists across rebuilds
    networks:
      - backend-network
    # No public port — internal network only
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── phpMyAdmin — profile "tools" (not started by default) ──────────────────
  # Worker service removed: no Celery/ARQ worker exists yet.
  # Re-add in Phase 2 when a background job system is introduced.
  #
  # phpMyAdmin requires explicit profile activation:
  #   docker compose --profile tools up phpmyadmin
  # Access via SSH tunnel: ssh -L 8080:localhost:8080 user@vps
  phpmyadmin:
    <<: *service-defaults
    image: phpmyadmin/phpmyadmin:5.2
    profiles:
      - tools
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      PMA_ABSOLUTE_URI: "http://localhost:8080/"
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - backend-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Certbot — SSL Auto-renewal ─────────────────────────────────────────────
  # First-time cert issuance (run before starting nginx):
  #   docker compose run --rm certbot certonly --webroot \
  #     -w /var/www/certbot -d yourdomain.com -d www.yourdomain.com \
  #     --email admin@yourdomain.com --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    init: true
    volumes:
      - ./storage/letsencrypt:/etc/letsencrypt
      - ./storage/certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - proxy-network

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  redis_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  proxy-network:
    driver: bridge
  backend-network:
    driver: bridge
