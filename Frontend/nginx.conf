# nginx.conf — Frontend container SPA config
# Serves the compiled React app and falls back to index.html for all routes
# so React Router handles client-side navigation.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Versioned/hashed static assets — cache aggressively ─────────────────
    # Vite appends content-hash to filenames, so these are safe to cache forever.
    location ~* \.(js|css|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        access_log off;
    }

    # ── Images & media — long cache ──────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
        access_log off;
    }

    # ── index.html — never cache; always fresh ───────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ── React SPA fallback — all unknown paths serve index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
