# nginx/conf.d/default.conf
# Main virtual host: HTTP redirect + HTTPS reverse proxy
# Replace all occurrences of "yourdomain.com" with your actual domain.

# ── HTTP — redirect all traffic to HTTPS ────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME webroot challenge (must be accessible over HTTP)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Docker healthcheck endpoint — responds 200 on port 80 without SSL
    # Required by: docker-compose healthcheck → wget http://localhost/health
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main application ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL/TLS — Let's Encrypt certificates ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # ── Upload body size limit ────────────────────────────────────────────────
    client_max_body_size 20M;

    # ── Proxy defaults (applied in every proxy_pass block) ───────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout                 120s;
    proxy_connect_timeout              10s;
    proxy_send_timeout                 120s;

    # ── Static user-generated uploads — served directly by nginx ─────────────
    # Backend saves files to storage/uploads/; DB stores only the relative path.
    # Example DB value: "users/avatar.webp" → URL: /uploads/users/avatar.webp
    location /uploads/ {
        alias   /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;

        # Deny execution of server-side scripts from the uploads directory
        location ~* \.(php|py|sh|pl|rb|cgi)$ {
            deny all;
        }
    }

    # ── API — Auth endpoints (strict rate limit: 5 r/m, burst 3) ─────────────
    location /api/v1/auth/ {
        limit_req       zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;

        # WebSocket upgrade support (future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── API — General endpoints (30 r/m, burst 10) ───────────────────────────
    location /api/ {
        limit_req        zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;

        # WebSocket upgrade support (future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Frontend — React SPA ─────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:80;

        # WebSocket upgrade support (Vite HMR / future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
