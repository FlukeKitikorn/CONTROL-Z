# nginx/conf.d/phpmyadmin.conf
# Optional: nginx-proxied phpMyAdmin with IP allow-list restriction.
#
# Default setup (docker-compose.yaml):
#   phpMyAdmin is bound to 127.0.0.1:8080 on the VPS host.
#   Remote access requires an SSH tunnel:
#     ssh -L 8080:localhost:8080 user@your-vps
#     Then open: http://localhost:8080
#
# To enable nginx proxying instead (alternative approach):
#   1. Add phpmyadmin to proxy-network in docker-compose.yaml:
#        phpmyadmin:
#          networks:
#            - backend-network
#            - proxy-network   # add this line
#   2. Remove the ports: binding from phpmyadmin in docker-compose.yaml.
#   3. Uncomment this entire file.
#   4. Replace ADMIN_IP_1 / ADMIN_IP_2 with your actual admin IPs.
#   5. Replace yourdomain.com with your actual domain.
#
# ─────────────────────────────────────────────────────────────────────────────
#
# server {
#     listen 443 ssl;
#     http2  on;
#     server_name db-admin.yourdomain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
#
#     ssl_protocols             TLSv1.2 TLSv1.3;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache         shared:SSL:10m;
#     ssl_session_timeout       10m;
#
#     # ── IP Allow-list — DENY ALL except explicit admin IPs ─────────────────
#     # Only allow known admin IP addresses; deny everyone else.
#     allow ADMIN_IP_1;    # e.g. 203.0.113.10
#     allow ADMIN_IP_2;    # e.g. 198.51.100.20
#     deny  all;
#
#     location / {
#         proxy_pass         http://phpmyadmin:80;
#         proxy_set_header   Host              $host;
#         proxy_set_header   X-Real-IP         $remote_addr;
#         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
#         proxy_set_header   X-Forwarded-Proto $scheme;
#         proxy_read_timeout 120s;
#     }
# }
#
# ── HTTP redirect for the admin subdomain ─────────────────────────────────
# server {
#     listen 80;
#     server_name db-admin.yourdomain.com;
#
#     location /.well-known/acme-challenge/ {
#         root /var/www/certbot;
#         try_files $uri =404;
#     }
#
#     location / {
#         return 301 https://$host$request_uri;
#     }
# }
