name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build Docker images and push to GHCR ────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_prefix: ${{ steps.meta.outputs.image_prefix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and image prefix
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          IMAGE_PREFIX="${{ env.REGISTRY }}/${{ github.repository_owner }}/controlz"
          echo "version=${VERSION}"       >> $GITHUB_OUTPUT
          echo "image_prefix=${IMAGE_PREFIX}" >> $GITHUB_OUTPUT
          echo "Deploying version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ────────────────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-backend:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      # ── Frontend image ───────────────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ── SSH into VPS and deploy new images ──────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /opt/controlz

            echo "Deploying version: ${{ needs.build-and-push.outputs.version }}"

            # Update image version in compose override (or set via env)
            # The production compose uses image: tags — update them here.
            VERSION="${{ needs.build-and-push.outputs.version }}"
            IMAGE_PREFIX="${{ env.REGISTRY }}/${{ github.repository_owner }}/controlz"

            # Export so docker compose picks them up if using variable substitution
            export BACKEND_IMAGE="${IMAGE_PREFIX}-backend:${VERSION}"
            export FRONTEND_IMAGE="${IMAGE_PREFIX}-frontend:${VERSION}"

            # Pull updated images
            docker compose pull

            # Rolling deploy (start-first order set in deploy.update_config)
            docker compose up -d --remove-orphans

            # Clean up dangling images to reclaim disk space
            docker image prune -f

            echo "Deployment of ${VERSION} complete."
