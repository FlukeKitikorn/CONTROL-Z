name: Deploy

on:
  # Auto-deploy on tag push
  # Tag pattern:  v1.2.3           → prod
  #               v1.2.3-dev/beta/rc → dev
  push:
    tags:
      - 'v*.*.*'

  # Manual deploy: choose environment + image tag
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
      tag:
        description: 'Version to deploy — digits only, no "v" prefix (e.g. 1.2.3 or 1.2.3-dev)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # ── Resolve environment and version from tag or manual input ─────────────────
  setup:
    name: Resolve Context
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      version:     ${{ steps.ctx.outputs.version }}
      floating_tag: ${{ steps.ctx.outputs.floating_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # needed for branch ancestry check

      # Gate 1: tag must originate from the releases branch
      - name: Verify tag is on releases branch
        if: github.event_name != 'workflow_dispatch'
        run: |
          git fetch origin releases
          if ! git merge-base --is-ancestor "${{ github.sha }}" origin/releases; then
            echo "::error::Tags must be created from the 'releases' branch. Aborting."
            exit 1
          fi
          echo "Verified: commit is on the releases branch."

      # Gate 2: wait for CI to complete on this commit before doing anything.
      # Polls every 30 s for up to 15 min (tag push only; manual dispatch skips this).
      - name: Verify CI checks passed
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for CI checks on ${{ github.sha }} ..."
          for i in $(seq 1 30); do
            RESULT=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
              --jq '
                .check_runs
                | map(select(.name | test("Security Scan|Test Backend|Test Frontend")))
                | if length == 0 then "pending"
                  elif all(.conclusion == "success") then "success"
                  elif any(.conclusion | . == "failure" or . == "cancelled" or . == "timed_out") then "failure"
                  else "pending"
                  end
              ')
            echo "Attempt ${i}/30 — CI status: ${RESULT}"
            [ "$RESULT" = "success" ] && { echo "CI passed. Proceeding."; break; }
            [ "$RESULT" = "failure" ] && { echo "CI failed. Aborting deploy."; exit 1; }
            sleep 30
          done
          [ "$RESULT" != "success" ] && { echo "CI timed out after 15 min."; exit 1; } || true

      - name: Resolve environment and version
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
            # Auto-prepend "v" if user didn't type it
            RAW="${{ inputs.tag }}"
            RAW="${RAW#v}"          # strip leading v if present
            VERSION="v${RAW}"      # always ensure v prefix

            # Validate tag exists on GitHub
            if ! gh api "repos/${{ github.repository }}/git/refs/tags/${VERSION}" \
                --silent 2>/dev/null; then
              echo "::error::Tag '${VERSION}' does not exist on GitHub. Create it first with: git tag ${VERSION} && git push origin ${VERSION}"
              exit 1
            fi
            echo "Tag ${VERSION} verified on GitHub."
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG}"
            if [[ "$TAG" =~ -(dev|beta|rc|alpha) ]]; then
              ENV="dev"
            else
              ENV="prod"
            fi
          fi

          FLOATING_TAG="$( [ "$ENV" = "prod" ] && echo "latest" || echo "dev" )"

          echo "environment=${ENV}"       >> $GITHUB_OUTPUT
          echo "version=${VERSION}"       >> $GITHUB_OUTPUT
          echo "floating_tag=${FLOATING_TAG}" >> $GITHUB_OUTPUT
          echo "Resolved: version=${VERSION}  env=${ENV}  floating=${FLOATING_TAG}"

  # ── Build Docker images and push to GHCR ─────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_prefix: ${{ steps.meta.outputs.image_prefix }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.setup.outputs.version }}

      - name: Lowercase repository owner
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set image prefix
        id: meta
        run: |
          IMAGE_PREFIX="${{ env.REGISTRY }}/${{ github.repository_owner }}/controlz"
          echo "image_prefix=${IMAGE_PREFIX}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker layer cache is stored in GitHub Actions Cache (GHA scope per image)
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-backend:${{ needs.setup.outputs.version }}
            ${{ steps.meta.outputs.image_prefix }}-backend:${{ needs.setup.outputs.floating_tag }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-frontend:${{ needs.setup.outputs.version }}
            ${{ steps.meta.outputs.image_prefix }}-frontend:${{ needs.setup.outputs.floating_tag }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ── Deploy to Dev VPS ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev VPS
    needs: [setup, build-and-push]
    if: needs.setup.outputs.environment == 'dev'
    runs-on: ubuntu-latest
    environment: development   # maps to GitHub environment (can require approval)

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_DEV_HOST }}
          username: ${{ secrets.VPS_DEV_USER }}
          key:      ${{ secrets.VPS_DEV_SSH_KEY }}
          port:     ${{ secrets.VPS_DEV_PORT }}
          script: |
            set -euo pipefail
            cd /opt/controlz

            export IMAGE_TAG="${{ needs.setup.outputs.version }}"
            export GHCR_ORG="${{ github.repository_owner }}"

            docker compose -f compose.yaml -f compose.prod.yaml pull
            docker compose -f compose.yaml -f compose.prod.yaml up -d --remove-orphans
            docker image prune -f
            echo "Dev deployment of ${IMAGE_TAG} complete."

  # ── Deploy to Prod VPS ────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod VPS
    needs: [setup, build-and-push]
    if: needs.setup.outputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: production    # maps to GitHub environment (can require approval)

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            cd /opt/controlz

            export IMAGE_TAG="${{ needs.setup.outputs.version }}"
            export GHCR_ORG="${{ github.repository_owner }}"

            docker compose -f compose.yaml -f compose.prod.yaml pull
            docker compose -f compose.yaml -f compose.prod.yaml up -d --remove-orphans
            docker image prune -f
            echo "Prod deployment of ${IMAGE_TAG} complete."
