name: CI

on:
  push:
    branches:
      - main
      - develop
      - releases
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop
      - releases
  workflow_dispatch:  # allow manual trigger from GitHub UI or CLI

jobs:
  # ── Security Scan (runs first — fail fast before wasting build minutes) ───────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history

      # 1. Secret / credential leak scan
      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} #github token

      # 2. Python — dependency CVE scan + SAST
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Backend/requirements.txt

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: Dependency scan — Backend (pip-audit)
        run: pip-audit -r Backend/requirements.txt --progress-spinner off

      - name: SAST — Backend (Bandit medium+)
        # run: bandit -r Backend/app/ -ll -q
        run: echo "Bandit scan skipped (commented out) — disable now"

      # 3. Node — dependency CVE scan
      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: Frontend
        run: npm ci --frozen-lockfile

      - name: Dependency scan — Frontend (npm audit)
        working-directory: Frontend
        run: npm audit --audit-level=high

  # ── Backend — Python tests ─────────────────────────────────────────────────
  test-backend:
    name: Test Backend (Python 3.12)
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Backend/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Run pytest
        run: pytest --tb=short -q

  # ── Frontend — Lint + build + upload artifact ─────────────────────────────
  test-frontend:
    name: Test Frontend (Node 20)
    needs: security-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Lint
        # run: npm run lint
        run: echo "Lint skipped (commented out) — disable now"

      - name: Build
        run: npm run build

      # Cache built dist so deploy workflow can download without rebuilding
      - name: Upload Frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: Frontend/dist/
          retention-days: 7
