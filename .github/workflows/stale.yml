name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 3 * * 1'  # every Monday 03:00 UTC (10:00 Bangkok)
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: stale
          stale-issue-message: >
            This issue has had no activity for 30 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            This issue was closed automatically due to inactivity.
            Feel free to reopen if still relevant.

          # Pull Requests
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: stale
          stale-pr-message: >
            This PR has had no activity for 14 days and has been marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-pr-message: >
            This PR was closed automatically due to inactivity.
            Feel free to reopen when ready.

          # Never mark these as stale
          exempt-issue-labels: 'pinned,security,breaking-change'
          exempt-pr-labels: 'pinned,security'
