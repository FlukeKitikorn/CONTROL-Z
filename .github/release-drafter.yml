name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
tag-prefix: v

categories:
  - title: 'New Features'
    labels:
      - feature
      - enhancement
  - title: 'Bug Fixes'
    labels:
      - bug
      - fix
  - title: 'Security'
    labels:
      - security
  - title: 'Maintenance'
    labels:
      - dependencies
      - ci
      - chore

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking-change
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - fix
      - security
      - dependencies
      - chore
  default: patch

template: |
  ## Changes
  $CHANGES
