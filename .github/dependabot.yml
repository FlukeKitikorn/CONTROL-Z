version: 2
updates:
  # Python backend dependencies
  - package-ecosystem: pip
    directory: /Backend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      python-minor-patch:
        update-types:
          - minor
          - patch

  # Node frontend dependencies
  - package-ecosystem: npm
    directory: /Frontend
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    groups:
      node-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    labels:
      - dependencies
      - ci
