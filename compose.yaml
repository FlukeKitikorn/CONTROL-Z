# compose.yaml — CONTROL-Z Base Configuration
#
# This is the BASE compose file. Always use with an override:
#
#   Development:
#     docker compose -f compose.yaml -f compose.dev.yaml up
#
#   Production:
#     docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# First run — create storage directories:
#   mkdir -p storage/{uploads/{users,products,documents,temp},backup,logs/nginx,letsencrypt,certbot-webroot}

name: controlz

# ── Shared defaults applied to every service via <<: *service-defaults ────────
x-service-defaults: &service-defaults
  restart: unless-stopped
  init: true          # tini handles zombie reaping + clean SIGTERM forwarding
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

# ── Backend / Worker environment — single source of truth ────────────────────
x-backend-env: &backend-env
  DATABASE_URL: "mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
  PASSWORD_RESET_SECRET_KEY: "${PASSWORD_RESET_SECRET_KEY}"
  DEBUG: "${DEBUG:-false}"
  CORS_ORIGINS: "${CORS_ORIGINS}"
  FRONTEND_BASE_URL: "${FRONTEND_BASE_URL}"
  MAIL_ENABLED: "${MAIL_ENABLED:-false}"
  MAIL_SERVER: "${MAIL_SERVER:-smtp.gmail.com}"
  MAIL_PORT: "${MAIL_PORT:-587}"
  MAIL_STARTTLS: "${MAIL_STARTTLS:-true}"
  MAIL_SSL_TLS: "${MAIL_SSL_TLS:-false}"
  MAIL_USERNAME: "${MAIL_USERNAME:-}"
  MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
  MAIL_FROM: "${MAIL_FROM:-}"
  MAIL_FROM_NAME: "${MAIL_FROM_NAME:-CONTROL-Z}"
  REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
  REDIS_CACHE_ENABLED: "${REDIS_CACHE_ENABLED:-true}"
  REDIS_SESSIONS_ENABLED: "${REDIS_SESSIONS_ENABLED:-true}"
  REDIS_CACHE_EF_TTL_SECONDS: "${REDIS_CACHE_EF_TTL_SECONDS:-3600}"
  REDIS_CACHE_CALC_LATEST_TTL_SECONDS: "${REDIS_CACHE_CALC_LATEST_TTL_SECONDS:-120}"
  REDIS_CACHE_ANNOUNCEMENTS_TTL_SECONDS: "${REDIS_CACHE_ANNOUNCEMENTS_TTL_SECONDS:-60}"
  REDIS_CACHE_BUNDLE_TTL_SECONDS: "${REDIS_CACHE_BUNDLE_TTL_SECONDS:-120}"
  SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-86400}"
  UPLOAD_ROOT: "/app/storage/uploads"

services:

  # ── Nginx — Reverse Proxy + SSL + Rate Limiting + Static Files ──────────────
  nginx:
    <<: *service-defaults
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./storage/uploads:/var/www/uploads:ro
      - ./storage/letsencrypt:/etc/letsencrypt:ro
      - ./storage/certbot-webroot:/var/www/certbot:ro
      - ./storage/logs/nginx:/var/log/nginx
    networks:
      - proxy-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    # read_only + tmpfs: nginx needs to write PID, cache, and temp files
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend — React SPA (image source defined in override file) ────────────
  frontend:
    <<: *service-defaults
    networks:
      - proxy-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    # read_only: nginx:alpine writes cache and PID files; tmpfs covers them
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

  # ── Backend — FastAPI + Uvicorn (image source defined in override file) ─────
  backend:
    <<: *service-defaults
    user: "1001:1001"   # matches appuser UID/GID created in Dockerfile
    environment:
      <<: *backend-env
    volumes:
      - ./storage/uploads:/app/storage/uploads
    networks:
      - proxy-network
      - backend-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────────
  mysql:
    <<: *service-defaults
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-control_z}"
      MYSQL_USER: "${MYSQL_USER:-user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql     # named volume — managed by Docker
      - ./storage/backup:/backup:ro   # read-only access for backup scripts
    networks:
      - backend-network
    # No public port — internal network only
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    <<: *service-defaults
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data               # named volume — managed by Docker
    networks:
      - backend-network
    # No public port — internal network only
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── phpMyAdmin — profile "tools" (prod/VPS เปิดด้วย --profile tools)
  # Dev: compose.dev.yaml เปิดอัตโนมัติที่พอร์ต 8081
  phpmyadmin:
    <<: *service-defaults
    image: phpmyadmin/phpmyadmin:5.2
    profiles:
      - tools
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    networks:
      - backend-network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # ── Certbot — Let's Encrypt SSL Auto-renewal ────────────────────────────────
  # First-time certificate issuance (run once before starting nginx):
  #   docker compose -f compose.yaml -f compose.prod.yaml run --rm certbot \
  #     certonly --webroot -w /var/www/certbot \
  #     -d yourdomain.com -d www.yourdomain.com \
  #     --email admin@yourdomain.com --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    init: true
    volumes:
      - ./storage/letsencrypt:/etc/letsencrypt
      - ./storage/certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks:
      - proxy-network

# ── Named Volumes ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:    # MySQL data — persisted across container restarts
  redis_data:    # Redis AOF data — persisted across container restarts

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  proxy-network:     # Public-facing: nginx ↔ frontend ↔ backend
    driver: bridge
  backend-network:   # Internal only: backend ↔ mysql ↔ redis ↔ phpmyadmin
    driver: bridge
